<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Inner Fill (Electric Lime to match the Brutalist theme) -->
  <rect x="18" y="18" width="28" height="28" fill="#E0FF62" />
  
  <!-- Left Vertical Line -->
  <line x1="18" y1="6" x2="18" y2="46" stroke="#000000" stroke-width="6" stroke-linecap="square" />
  <!-- Top Horizontal Line -->
  <line x1="6" y1="18" x2="46" y2="18" stroke="#000000" stroke-width="6" stroke-linecap="square" />
  
  <!-- Right Vertical Line -->
  <line x1="46" y1="18" x2="46" y2="58" stroke="#000000" stroke-width="6" stroke-linecap="square" />
  <!-- Bottom Horizontal Line -->
  <line x1="18" y1="46" x2="58" y2="46" stroke="#000000" stroke-width="6" stroke-linecap="square" />
</svg>
